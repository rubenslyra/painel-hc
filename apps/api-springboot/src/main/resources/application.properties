server.port=${SERVER_PORT:18082}
spring.application.name=rm-mock-api
management.endpoints.web.exposure.include=health,info
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/painel_hc_rm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:painel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:painel}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

rm.mock.projects=${RM_MOCK_PROJECTS:20}
rm.mock.analysts=${RM_MOCK_ANALYSTS:48}
rm.mock.entries-per-project=${RM_MOCK_ENTRIES_PER_PROJECT:36}
rm.mock.seed=${RM_MOCK_SEED:42}
rm.webhook.target-url=${RM_WEBHOOK_TARGET_URL:http://localhost:5080/api/v1/erp-webhooks/rm-events}
rm.webhook.initial-delay-ms=${RM_WEBHOOK_INITIAL_DELAY_MS:30000}
rm.webhook.interval-5-ms=${RM_WEBHOOK_INTERVAL_5_MS:300000}
rm.webhook.interval-17-ms=${RM_WEBHOOK_INTERVAL_17_MS:1020000}
rm.webhook.interval-3-ms=${RM_WEBHOOK_INTERVAL_3_MS:180000}
rm.webhook.interval-40-ms=${RM_WEBHOOK_INTERVAL_40_MS:2400000}
rm.webhook.interval-86-ms=${RM_WEBHOOK_INTERVAL_86_MS:5160000}
