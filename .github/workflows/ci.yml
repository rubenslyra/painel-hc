name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x ./mvnw
      - run: ./mvnw -B test

  dotnet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bff-dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore Painel.sln
      - run: dotnet build Painel.sln -c Release --no-restore
      - run: dotnet test Painel.sln -c Release --no-build --logger trx

  angular:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web-angular/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run e2e
      - name: Upload Angular artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-angular
          path: apps/web-angular/dist/web
