services:
  painel-hc-db:
    image: postgres:16-alpine
    container_name: painel-hc-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: painel
      POSTGRES_PASSWORD: painel
      POSTGRES_DB: painel_hc
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U painel -d painel_hc"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
